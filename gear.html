<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>三齿轮训练</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#0d0d0d;color:#d4d4d4;padding:0;min-height:100vh;display:flex;flex-direction:column}
.header{padding:12px 16px 0;display:flex;justify-content:space-between;align-items:center}
.header h1{font-size:18px;font-weight:600;color:#eee;letter-spacing:1px}
.header .sub{font-size:11px;color:#555;margin-top:2px}
.tabs{display:flex;gap:3px;margin:10px 12px 0;padding:0}
.tab{flex:1;padding:10px 0;text-align:center;font-size:13px;border:1px solid #222;border-radius:8px 8px 0 0;background:#111;color:#555;cursor:pointer;transition:all .15s;user-select:none;border-bottom:none}
.tab.active{background:#1a1a1a;color:#eee;border-color:#333}
.tab.active.t1{color:#4a9eff;border-color:#4a9eff}
.tab.active.t2{color:#ff6b6b;border-color:#ff6b6b}
.tab.active.t3{color:#51cf66;border-color:#51cf66}
.tab.active.tv{color:#cc9aff;border-color:#cc9aff}
.panel{display:none;padding:12px;flex:1;overflow-y:auto}
.panel.active{display:block}

/* 输入区 */
.input-area{background:#111;border:1px solid #222;border-radius:8px;padding:12px;margin-bottom:8px}
.input-area label{font-size:11px;color:#666;display:block;margin-bottom:4px;font-weight:500}
.input-area textarea{width:100%;min-height:56px;padding:8px;background:#151515;border:1px solid #2a2a2a;border-radius:4px;color:#d4d4d4;font-size:13px;line-height:1.5;resize:vertical;font-family:inherit;outline:none}
.input-area textarea:focus{border-color:#555}

/* 分析结果 */
.analysis-box{display:none;background:#0e1622;border:1px solid #1a2e4a;border-radius:8px;padding:12px;margin-bottom:8px;font-size:12px;line-height:1.7;white-space:pre-wrap;color:#c8d6e5}
.analysis-box.show{display:block}

/* 对比结果 */
.compare-box{display:none;background:#1a1515;border:1px solid #3a2222;border-radius:8px;padding:12px;margin-bottom:8px;font-size:12px;line-height:1.7;white-space:pre-wrap;color:#e8d5d5}
.compare-box.show{display:block}

/* 按钮 */
.btn-row{display:flex;gap:4px;flex-wrap:wrap;margin:4px 0}
.btn{padding:7px 14px;border:1px solid #222;border-radius:5px;background:#151515;color:#999;font-size:12px;cursor:pointer;transition:all .1s;user-select:none}
.btn:active{background:#222}
.btn.primary{background:#4a9eff;border-color:#4a9eff;color:#fff;font-weight:500}
.btn.primary:active{background:#3a8eef}
.btn.ai{background:#0e1a2e;border-color:#2a4a7a;color:#6aaeff}
.btn.compare{background:#2a1515;border-color:#4a2a2a;color:#ff8a8a}
.btn.done{background:#1a2e1a;border-color:#2a4a2a;color:#6aee6a}
.btn.loading{opacity:.5;pointer-events:none}

/* 复盘 */
.stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:8px}
.stat-card{padding:10px;border-radius:6px;text-align:center;background:#111;border:1px solid #222}
.stat-card .num{font-size:22px;font-weight:600}
.stat-card .label{font-size:10px;color:#666;margin-top:2px}
.stat-card.g1 .num{color:#4a9eff}
.stat-card.g2 .num{color:#ff6b6b}
.stat-card.g3 .num{color:#51cf66}
.timeline{max-height:55vh;overflow-y:auto}
.entry{background:#111;border:1px solid #222;border-radius:6px;padding:8px 10px;margin-bottom:5px}
.entry .meta{font-size:10px;color:#555;margin-bottom:2px;display:flex;justify-content:space-between}
.entry .gear-tag{display:inline-block;font-size:10px;padding:1px 5px;border-radius:3px}
.g1c{color:#4a9eff;border:1px solid #1a2e4a}
.g2c{color:#ff6b6b;border:1px solid #4a1a1a}
.g3c{color:#51cf66;border:1px solid #1a3a1a}
.entry .text{font-size:11px;line-height:1.5;white-space:pre-wrap;word-break:break-word;color:#aaa}
.empty{text-align:center;color:#444;padding:20px;font-size:12px}
.review-filters{display:flex;gap:4px;margin-bottom:8px;flex-wrap:wrap}

/* 提示条 */
.tip-bar{display:none;background:#111;border:1px solid #222;border-radius:6px;padding:8px 10px;margin-bottom:8px;font-size:11px;color:#888;line-height:1.6}
.tip-bar.show{display:block}

/* 设置 */
.setting-group{margin-bottom:10px}
.setting-group label{font-size:11px;color:#666;margin-bottom:4px;display:block}
.setting-group textarea{width:100%;min-height:50px;padding:8px;background:#111;border:1px solid #222;border-radius:4px;color:#d4d4d4;font-size:12px;font-family:monospace;outline:none}
.toast-container{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);z-index:9999;pointer-events:none}
.toast{background:#4a9eff;color:#fff;padding:8px 18px;border-radius:8px;font-size:14px;opacity:0;transition:opacity .2s;max-width:85vw;text-align:center;margin-bottom:6px}
.toast.show{opacity:1}
.toast.warn{background:#ff6b6b}
.toast.ok{background:#51cf66}
</style>
</head>
<body>
<div class="header"><div><h1>⚙ 三齿轮训练</h1><div class="sub" id="counter">0 条</div></div><div><button class="btn" onclick="showSettings()" style="font-size:16px;padding:4px 10px">⚙</button></div></div>
<div class="tabs">
  <div class="tab active t1" data-tab="1">① 拆</div>
  <div class="tab t2" data-tab="2">② 挖</div>
  <div class="tab t3" data-tab="3">③ 产</div>
  <div class="tab tv" data-tab="v">📊 复盘</div>
</div>

<!-- 三个齿轮用同一套模板，JS动态渲染 -->
<div class="panel" id="p1"></div>
<div class="panel" id="p2"></div>
<div class="panel" id="p3"></div>

<!-- 复盘 -->
<div class="panel" id="pv">
  <div class="stats"><div class="stat-card g1"><div class="num" id="s1">0</div><div class="label">① 拆</div></div><div class="stat-card g2"><div class="num" id="s2">0</div><div class="label">② 挖</div></div><div class="stat-card g3"><div class="num" id="s3">0</div><div class="label">③ 产</div></div></div>
  <div class="tip-bar" id="tipBar"></div>
  <div class="review-filters">
    <button class="btn" onclick="review('all')">全部</button>
    <button class="btn g1c" onclick="review(1)">① 拆</button>
    <button class="btn g2c" onclick="review(2)">② 挖</button>
    <button class="btn g3c" onclick="review(3)">③ 产</button>
    <button class="btn" onclick="review('today')">今天</button>
    <button class="btn" onclick="review('week')">本周</button>
  </div>
  <div class="timeline" id="timeline"></div>
</div>

<!-- 设置 -->
<div class="panel" id="ps">
  <div class="input-area" style="margin-bottom:10px">
    <label>🔗 AI 服务器地址</label>
    <div style="font-size:11px;color:#666;margin-bottom:4px">手机连不上时，在这里填电脑 `gear serve` 显示的地址</div>
    <div style="display:flex;gap:4px">
      <input id="serverUrl" type="text" style="flex:1;padding:7px 10px;background:#151515;border:1px solid #2a2a2a;border-radius:4px;color:#d4d4d4;font-size:13px;outline:none" placeholder="http://192.168.x.x:8899" value="">
      <button class="btn primary" onclick="saveServerUrl()">保存</button>
      <button class="btn" onclick="checkServer()" style="color:#4a9eff">检测</button>
    </div>
    <div id="serverStatus" style="font-size:11px;margin-top:4px"></div>
  </div>
  <div class="setting-group"><label>📋 导出数据</label><textarea id="exportData" readonly></textarea><div class="btn-row"><button class="btn" onclick="copyExport()">复制</button></div></div>
  <div class="setting-group"><label>📥 导入数据</label><textarea id="importData" placeholder="粘贴 JSON..."></textarea><div class="btn-row"><button class="btn primary" onclick="importData()">导入</button></div></div>
</div>

<div class="toast-container" id="toastBox"></div>

<script>
const KEY='gear_entries';const NAMES={1:'① 拆结构',2:'② 挖人性',3:'③ 压产出'};
const STORED_API = localStorage.getItem('gear_api_url');
const API_BASE = STORED_API || window.location.origin;
const IS_LOCAL = !window.location.host.includes('github.io') && !window.location.host.includes('pages.dev');

// 三个齿轮的配置
const GEAR_CFG = {
  1:{label:'① 拆结构',inputTitle:'你看到了什么现象？',inputHint:'一个案例、一个观点、一件让你困惑的事',aiBtn:'🤖 AI帮我拆','exprTitle':'我的分析：吸收后用自己的话表达','exprHint':'看完AI分析后，你自己来写——用2×2、三层或反事实推演','doneBtn':'✓ 保存并对比'},
  2:{label:'② 挖人性',inputTitle:'你观察到了什么行为？',inputHint:'客户/用户/身边的人说了什么、做了什么',aiBtn:'🤖 AI帮我挖','exprTitle':'我的洞察：吸收后写你的判断','exprHint':'他的驱动力是什么？在哪个象限？利益地图是什么？','doneBtn':'✓ 保存并对比'},
  3:{label:'③ 压产出',inputTitle:'你的洞察/判断是什么？',inputHint:'基于最近的拆解或挖人，你得到了什么结论',aiBtn:'🤖 AI帮产出','exprTitle':'我的产出：写你的产出方案','exprHint':'框架/行动/决策日志/产品化 ——选一个写','doneBtn':'✓ 保存并对比'},
};

function getE(){try{return JSON.parse(localStorage.getItem(KEY)||'[]')}catch{return[]}}
function setE(e){localStorage.setItem(KEY,JSON.stringify(e))}

function toast(msg,type){
  const box=document.getElementById('toastBox');
  const el=document.createElement('div');el.className='toast'+(type?' '+type:'');el.textContent=msg;
  box.appendChild(el);
  requestAnimationFrame(()=>el.classList.add('show'));
  setTimeout(()=>{el.classList.remove('show');setTimeout(()=>el.remove(),200)},1400);
}

function esc(t){const d=document.createElement('div');d.textContent=t;return d.innerHTML}

// 渲染齿轮面板
function renderGearPanel(g){
  const cfg=GEAR_CFG[g];
  const state=JSON.parse(sessionStorage.getItem(`g${g}_state`)||'{}');
  document.getElementById('p'+g).innerHTML=
    '<div class="input-area"><label>【第一步】'+cfg.inputTitle+'</label><textarea id="g'+g+'_in" placeholder="'+cfg.inputHint+'">'+esc(state.input||'')+'</textarea>'
    +'<div class="btn-row"><button class="btn ai" id="g'+g+'_aiBtn" onclick="aiAnalyze('+g+')">'+cfg.aiBtn+'</button></div></div>'
    +'<div class="analysis-box'+(state.analysis?' show':'')+'" id="g'+g+'_ai">'+esc(state.analysis||'')+'</div>'
    +'<div class="input-area" id="g'+g+'_exprArea"'+(state.analysis?'':' style="opacity:.4;pointer-events:none"')+'><label>【第二步】'+cfg.exprTitle+'</label><textarea id="g'+g+'_expr" placeholder="'+cfg.exprHint+'">'+esc(state.expr||'')+'</textarea>'
    +'<div class="btn-row"><button class="btn compare" id="g'+g+'_cmpBtn" onclick="aiCompare('+g+')">📊 对比差异</button>'
    +'<button class="btn done" id="g'+g+'_saveBtn" onclick="saveEntry('+g+')">'+cfg.doneBtn+'</button></div></div>'
    +'<div class="compare-box'+(state.compare?' show':'')+'" id="g'+g+'_cmp">'+esc(state.compare||'')+'</div>'
    +'<div id="g'+g+'_recent"></div>';
}

// 标签切换
document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>{
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(x=>x.classList.remove('active'));
  const tab=t.dataset.tab;
  t.classList.add('active',{1:'t1',2:'t2',3:'t3',v:'tv',s:'tv'}[tab]);
  if(tab==='1'||tab==='2'||tab==='3'){document.getElementById('p'+tab).classList.add('active');renderGearPanel(parseInt(tab));renderRecent(parseInt(tab));}
  else if(tab==='v'){document.getElementById('pv').classList.add('active');review('all');}
  else if(tab==='s'){document.getElementById('ps').classList.add('active');syncExport();}
}));

// AI分析
function aiAnalyze(g){
  const input=document.getElementById('g'+g+'_in');
  const text=input.value.trim();
  if(!text){toast('先写现象','warn');return;}
  const btn=document.getElementById('g'+g+'_aiBtn');
  btn.textContent='⏳ 分析中...';btn.classList.add('loading');
  const box=document.getElementById('g'+g+'_ai');

  fetch(API_BASE+'/api/analyze',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({gear:g,text})})
  .then(r=>r.json()).then(d=>{
    if(d.error){box.textContent='⚠️ '+d.error;box.classList.add('show');toast('分析失败','warn');return;}
    const analysis=d.analysis||'（无结果）';
    box.textContent=analysis;box.classList.add('show');
    sessionStorage.setItem(`g${g}_state`,JSON.stringify({input:text,analysis,expr:'',compare:''}));
    // 启用第二步
    const area=document.getElementById('g'+g+'_exprArea');area.style.opacity='1';area.style.pointerEvents='auto';
    toast('✅ 分析完成，现在用你自己的话表达','ok');
  }).catch(e=>{
    // 可能服务器没启动，降级到本地提示
    if(!navigator.onLine||e.message==='Failed to fetch'){
      box.textContent='⚠️ 未连接到 AI 服务器\n电脑上运行 gear serve 启动服务';box.classList.add('show');
    }else{box.textContent='⚠️ 请求失败: '+e.message;box.classList.add('show');}
    toast('连接失败','warn');
  }).finally(()=>{
    btn.textContent=GEAR_CFG[g].aiBtn;btn.classList.remove('loading');
  });
}

// 对比
function aiCompare(g){
  const state=JSON.parse(sessionStorage.getItem(`g${g}_state`)||'{}');
  const aiText=document.getElementById('g'+g+'_ai').textContent;
  const userText=document.getElementById('g'+g+'_expr').value.trim();
  if(!userText){toast('先写你的表达','warn');return;}
  if(!aiText||aiText.startsWith('⚠️')){toast('还没有AI分析结果','warn');return;}
  const btn=document.getElementById('g'+g+'_cmpBtn');
  btn.textContent='⏳ 对比中...';btn.classList.add('loading');
  const box=document.getElementById('g'+g+'_cmp');

  fetch(API_BASE+'/api/compare',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({user_text:userText,ai_text:aiText})})
  .then(r=>r.json()).then(d=>{
    if(d.error){box.textContent='⚠️ '+d.error;box.classList.add('show');toast('对比失败','warn');return;}
    const cmp=d.comparison||'（无结果）';
    box.textContent=cmp;box.classList.add('show');
    state.expr=userText;state.compare=cmp;
    sessionStorage.setItem(`g${g}_state`,JSON.stringify(state));
    toast('📊 差异已显示','ok');
  }).catch(e=>{
    if(!navigator.onLine||e.message==='Failed to fetch'){
      box.textContent='⚠️ 未连接到 AI 服务器\n电脑上运行 gear serve 启动服务';box.classList.add('show');
    }else{box.textContent='⚠️ 请求失败: '+e.message;box.classList.add('show');}
  }).finally(()=>{
    btn.textContent='📊 对比差异';btn.classList.remove('loading');
  });
}

// 保存
function saveEntry(g){
  const input=document.getElementById('g'+g+'_in').value.trim();
  const expr=document.getElementById('g'+g+'_expr').value.trim();
  const aiText=document.getElementById('g'+g+'_ai').textContent;
  const cmpText=document.getElementById('g'+g+'_cmp').textContent;
  if(!expr){toast('至少写你的表达','warn');return;}
  const entries=getE();
  const now=new Date();
  const ts=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-'+String(now.getDate()).padStart(2,'0')+' '+String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
  entries.unshift({gear:g,input,ai:aiText.startsWith('⚠️')?'':aiText,expr,compare:cmpText.startsWith('⚠️')?'':cmpText,time:ts,ts:Date.now()});
  setE(entries);
  // 重置
  document.getElementById('g'+g+'_in').value='';
  document.getElementById('g'+g+'_expr').value='';
  const aiBox=document.getElementById('g'+g+'_ai');aiBox.textContent='';aiBox.classList.remove('show');
  const cmpBox=document.getElementById('g'+g+'_cmp');cmpBox.textContent='';cmpBox.classList.remove('show');
  document.getElementById('g'+g+'_exprArea').style.opacity='.4';document.getElementById('g'+g+'_exprArea').style.pointerEvents='none';
  sessionStorage.removeItem(`g${g}_state`);
  updateStats();
  renderRecent(g);
  toast('✓ 已保存 — 去复盘看进步轨迹','ok');
}

// 最近记录
function renderRecent(g){
  const el=document.getElementById('g'+g+'_recent');
  const entries=getE().filter(e=>e.gear===g).slice(0,5);
  if(!entries.length){el.innerHTML='';return;}
  el.innerHTML='<div style="border-top:1px solid #222;padding-top:8px;margin-top:8px"><div style="font-size:10px;color:#444;margin-bottom:4px">历史记录</div>'
  +entries.map(e=>{
    const hasCmp=e.compare?'📊':'';
    return '<div class="entry" onclick="showDetail('+e.ts+')"><div class="meta"><span class="gear-tag g'+g+'c">'+hasCmp+NAMES[g]+'</span><span style="color:#444;font-size:10px">'+e.time+' <b onclick="event.stopPropagation();delEntry('+e.ts+')" style="color:#444;cursor:pointer;margin-left:4px">✕</b></span></div><div class="text">'+esc((e.expr||'').slice(0,80))+'</div></div>';
  }).join('')+'</div>';
}

// 查看详情
function showDetail(ts){
  const entry=getE().find(e=>e.ts===ts);
  if(!entry)return;
  const detail=[];
  if(entry.input)detail.push('【输入】\n'+entry.input);
  if(entry.ai)detail.push('【AI分析】\n'+entry.ai);
  if(entry.expr)detail.push('【我的表达】\n'+entry.expr);
  if(entry.compare)detail.push('【对比建议】\n'+entry.compare);
  alert(detail.join('\n\n'));
}

// 删除
function delEntry(ts){
  if(!confirm('删除这条？'))return;
  setE(getE().filter(e=>e.ts!==ts));
  updateStats();
  review(document.querySelector('.review-filters .btn.active')?.textContent||'all');
  toast('已删除');
}

// 统计
function updateStats(){
  const entries=getE();
  document.getElementById('counter').textContent=entries.length+' 条';
  const c={1:0,2:0,3:0};entries.forEach(e=>{c[e.gear]=(c[e.gear]||0)+1});
  document.getElementById('s1').textContent=c[1];document.getElementById('s2').textContent=c[2];document.getElementById('s3').textContent=c[3];
  const tip=document.getElementById('tipBar');
  let msg='';
  if(c[1]+c[2]+c[3]>0){
    const withCmp=entries.filter(e=>e.compare).length;
    if(c[3]<c[1]/2&&c[1]>2)msg='⚠️ 拆得多产得少';
    else if(withCmp>0)msg='✅ 有对比的记录: '+withCmp+'条 — 你在进步';
    else msg='💡 每次保存后点"对比差异"能看到进步';
  }
  if(msg){tip.textContent=msg;tip.classList.add('show');}else tip.classList.remove('show');
}

// 复盘
function review(f){
  let entries=getE();
  const now=new Date();const today=nowStr().slice(0,10);const wk=now.getTime()-7*24*60*60*1000;
  if(f==='today')entries=entries.filter(e=>e.time.startsWith(today));
  else if(f==='week')entries=entries.filter(e=>e.ts>wk);
  else if([1,2,3].includes(f))entries=entries.filter(e=>e.gear===f);
  const el=document.getElementById('timeline');
  if(!entries.length){el.innerHTML='<div class="empty">无记录</div>';return;}
  el.innerHTML=entries.map(e=>'<div class="entry" onclick="showDetail('+e.ts+')"><div class="meta"><span><span class="gear-tag g'+(e.gear||1)+'c">'+(NAMES[e.gear]||'?')+'</span>'+(e.compare?' <span style="color:#cc9aff;font-size:10px">📊已对比</span>':'')+'</span><span>'+e.time+' <b onclick="event.stopPropagation();delEntry('+e.ts+')" style="color:#444;cursor:pointer;margin-left:4px">✕</b></span></div><div class="text">'+esc((e.expr||e.input||'').slice(0,100))+'</div></div>').join('');
}

function nowStr(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')+' '+String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')}

// 设置
function showSettings(){syncExport();
  const url=localStorage.getItem('gear_api_url')||'';
  document.getElementById('serverUrl').value=url;
  checkServer();
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));document.querySelectorAll('.panel').forEach(x=>x.classList.remove('active'));document.getElementById('ps').classList.add('active')}
function saveServerUrl(){
  const url=document.getElementById('serverUrl').value.trim();
  if(url){localStorage.setItem('gear_api_url',url);toast('已保存，刷新页面生效','ok');location.reload();}
  else{localStorage.removeItem('gear_api_url');toast('已清除，使用当前页面地址','ok');location.reload();}
}
function checkServer(){
  const el=document.getElementById('serverStatus');
  const url=document.getElementById('serverUrl').value.trim()||window.location.origin;
  el.textContent='检查中...';el.style.color='#888';
  fetch(url+'/api/analyze',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({gear:1,text:'test'}),signal:AbortSignal.timeout(3000)})
  .then(r=>{if(r.ok){el.textContent='✅ 服务器已连接';el.style.color='#51cf66';}else{el.textContent='⚠️ 服务器返回错误: '+r.status;el.style.color='#ff6b6b';}})
  .catch(()=>{el.textContent='⚠️ 无法连接 — 电脑上运行 gear serve';el.style.color='#ff6b6b';});
}
function syncExport(){document.getElementById('exportData').value=JSON.stringify(getE(),null,2)}
function copyExport(){const el=document.getElementById('exportData');el.select();document.execCommand('copy');toast('已复制')}
function importData(){try{const p=JSON.parse(document.getElementById('importData').value.trim());if(!Array.isArray(p))throw 1;setE(p);document.getElementById('importData').value='';updateStats();toast('已导入 '+p.length+' 条','ok')}catch{toast('JSON格式错误','warn')}}

// 初始化
updateStats();
for(let g=1;g<=3;g++)renderGearPanel(g);
</script>
</body>
